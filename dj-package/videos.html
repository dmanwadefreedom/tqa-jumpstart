<script id="md-source" type="text/markdown"># DJ. 5 Phone Videos for the Funnel
**Total time:** 45 minutes to record all 5. One sitting.
**Tool:** Your iPhone, landscape orientation. Or your laptop camera if you prefer.
**Style:** Conversational. Like you're on a Zoom with one Security Manager. Not a YouTube production.
**Edit:** Zero. Just trim the start and end. Dylan handles upload.

**Where each video goes:**
- Videos 1-4 are embedded inside the sales doc (different sections)
- Video 5 fires automatically after someone books a call (post-booking nurture)

---

## RECORDING SETUP (5 min)

- Sit at your desk or on your couch. Good light on your face. Window light is best.
- iPhone landscape, propped on books or a tripod.
- Quiet room. AirPods optional (audio is better with them, but built-in mic is fine for casual).
- Wear what you'd wear to a board meeting (collared shirt, no jacket needed).
- Have water nearby.
- **No script.** Use the bullets below as your map. Talk to the lens like it's one person.

---

## VIDEO 1. WHY I WROTE THIS (60 seconds)

**Placement in doc:** Top of doc, before Part 1.

**Hook (first 5 seconds):** Look at lens, smile, say:
> "Hey. I'm DJ. If you clicked this doc, give me 60 seconds before you read."

**Bullets to hit:**
- 28 years as CISO. Deloitte, EY, Shell. 400+ orgs.
- Hired hundreds of Security Managers over the years. Promoted a lot of them into Director.
- Watched a much bigger group stay stuck in the manager tier for 5, 8, 10 years.
- "I wrote this doc because the manager-to-director jump is the most misunderstood leap in our industry."
- "Read the doc. Decide if it's for you. If yes, book a call at the bottom."

**Close (last 3 seconds):**
> "OK, see you at the bottom."

**What NOT to say:**
- Don't pitch the program in this video
- Don't say the price
- Don't say "I'm so excited" or "thanks for being here"

---

## VIDEO 2. THE CEILING IN PLAIN ENGLISH (60-90 seconds)

**Placement in doc:** After Part 3 ("The Ceiling You're Hitting").

**Hook (first 5 seconds):**
> "OK so you read Part 3. Let me put it in plain English."

**Bullets to hit:**
- The Director who got the role you applied for was less technical than you. That's true for almost everyone watching this.
- It's not politics. It's positioning.
- Above the manager line, the job changes. Below, you're paid for what you can DO. Above, you're paid for what you can INFLUENCE.
- The CISO across the table sees a strong technical operator. They don't see a Director yet.
- That gap between "can do the job" and "can be seen doing the job" is what's keeping you stuck.
- It doesn't close on its own. You have to close it.

**Close:**
> "Keep reading. The mechanism for closing it is in Part 5."

**What NOT to say:**
- Don't promise specific outcomes
- Don't give away the three shifts here (save for video 3)

---

## VIDEO 3. THE THREE SHIFTS (60-90 seconds)

**Placement in doc:** After Part 5 ("The Three Shifts").

**Hook (first 5 seconds):**
> "If you remember one thing from this whole doc, remember these three words."

**Bullets to hit:**
- Positioning. You stop sounding like an engineer. You describe your work at Director altitude.
- Executive Presence. You learn to talk about security in the language CFOs and board members speak. Risk, revenue, resilience, reputation.
- Director Network. You build a peer network one level above your current role. Because Director hiring is 80% warm intros.
- Make these three shifts, you get promoted. Skip them, you stay stuck.
- "I've watched this play out for 28 years. There's no fourth shift. It's these three."

**Close:**
> "Keep reading. I'll show you exactly how the program builds these in Parts 6 and 7."

**What NOT to say:**
- Don't go deep into HOW. The doc covers that.
- Don't compare yourself to other coaches

---

## VIDEO 4. WHAT TO EXPECT ON THE CALL (60-90 seconds)

**Placement in doc:** Right before the booking CTA at the end (Part 13).

**Hook (first 5 seconds):**
> "OK, you made it to the end. If you're considering booking the call, here's what you're walking into."

**Bullets to hit:**
- Not a sales call. Working call.
- 30 minutes. I'll ask you about where you are, where you want to go.
- I'll be direct. If you're not ready or this isn't the right move, I'll tell you on the call and point you somewhere better.
- If we both decide it's a fit, I'll send the enrollment link after we hang up. You take 24 hours to think about it. Done.
- "I run all these calls myself. You're not getting handed off to a closer."

**Close:**
> "Book whenever works. Talk soon."

**What NOT to say:**
- Don't oversell the program
- Don't say "this might be the most important call of your career"
- Don't push for a Stripe link mid-call

---

## VIDEO 5. PRE-CALL WALKTHROUGH (3-5 minutes, post-booking)

**Placement:** Sent automatically via GHL email when Calendly fires the booking webhook. Prospect watches it 1-3 days before the call.

**Why this video matters most:** Show rate jumps from ~65% to ~88%. Close rate on call jumps from ~20% to ~33%. This single video is worth more revenue than the other 4 combined.

**Hook (first 10 seconds):**
> "Hey [pretend you're saying their first name]. Thanks for booking the call. I record one video for everyone who books, takes 4 minutes, walks you through what we're going to cover and how to make the most of our time together."

**Section 1. What to bring (60 sec)**
> "Three things. Have these ready before we hop on.
>
> One. Your current résumé. Doesn't need to be polished. Just whatever you'd send a recruiter today.
>
> Two. Your salary target. Not a range. A specific number you want to be earning 18 months from now.
>
> Three. Your honest answer to this question. 'Why haven't you been promoted yet?' This is the most important one. Don't bring me what you'd tell your boss. Bring me the truthful version. The one you tell yourself when you're frustrated."

**Section 2. What this call is and isn't (60 sec)**
> "Not a sales call. Working call.
>
> I'll ask you hard questions. I might tell you things you don't want to hear about how you're currently positioning yourself. That's not me being harsh. That's me showing you what a CISO sees when they look at your résumé.
>
> If after we talk it's clear you're not the right fit for this program, I'll tell you on the call. I'll point you to a better resource if I know one. I'd rather lose a sale than take your money for something that won't work."

**Section 3. What happens after the call (60 sec)**
> "If we both decide it's a fit, by the end of the day I send you the enrollment link. You take 24 hours. No high-pressure close on the call. No discount that expires at midnight. None of that.
>
> You think it through. If yes, you send the payment, we book your Week 1 session. If no, you reply 'no thanks' and I respect it. No follow-up emails for 6 months."

**Section 4. One thing to think about before we talk (45 sec)**
> "I want you to come in ready to answer this one question.
>
> 'If nothing changes in the next 18 months, where do you end up?'
>
> Same role. Same company maybe. Maybe a different company at the same level.
>
> Now ask yourself: are you OK with that?
>
> If yes, we probably shouldn't talk. If the answer makes you uncomfortable, that's the conversation we're going to have on the call."

**Close (15 sec):**
> "See you [Wednesday/Thursday/whatever day]. Looking forward to it."

**Total: ~4 minutes.**

**What NOT to say:**
- Don't reference the specific date (use day of week so video is reusable)
- Don't recap the program details (the doc already did)
- Don't pitch
- Don't say "I've helped hundreds of people just like you"

**Production note:** This is the most important of the 5 videos. Take 2-3 takes if you need to. The pace should be slower than the other 4 because it's longer.

---

## DELIVERY TIPS (DJ, read these once before recording)

1. **Talk slower than feels normal.** On video, your normal pace sounds rushed. Slow down 20%.

2. **Use your hands.** They're going to be in frame. Use them like you do on board calls.

3. **Pause for emphasis.** Silence on video is louder than words. After "It doesn't close on its own" pause 1 second before the next sentence.

4. **One take rule.** If you flub a line, stop, breathe, start the WHOLE video over. Don't try to splice. Easier to re-shoot than edit.

5. **Don't look at notes.** Talk like you're explaining this to a Manager you respect over coffee. The bullets are for prep, not reading.

6. **Energy.** Match the audience. Senior, technical, no time for theater. Direct. Calm. Confident.

7. **Length check.** If video 1 runs 90 seconds, that's fine. If video 4 runs 2 minutes, that's fine. Don't watch the timer. Watch the message.

---

## DELIVERY TO DYLAN

When you're done:
1. Send all 4 videos via WhatsApp (just drag from Photos to chat).
2. Tell me which is which: "video 1 is the why, video 2 is the ceiling, etc."
3. I trim the start/end (5 sec each side max), upload to GitHub repo, embed in the doc.
4. You see the live versions in the doc the same day.

---

## IF YOU'RE STUCK ON A VIDEO

Just text me which one. I'll send a fresh prompt or rewrite the bullets. Don't agonize. We'd rather ship 3 of 4 videos than wait for perfection on all 4.

---

## DEADLINE

To launch April 25, I need all 5 videos by **Monday April 21 morning your time**.

If you can record them this weekend (Sat 19 or Sun 20), I have all of Monday to embed and test.

**Priority order if you're running short:**
1. Video 5 (pre-call) - DO NOT skip. This is the highest revenue lever.
2. Video 1 (intro at top of doc)
3. Video 4 (close at bottom of doc)
4. Videos 2 and 3 (mid-doc) - launch without these, add mid-week if needed.

If you can only get 1 of 5 done by Monday, **make it Video 5**.

---

## ONE QUICK CHECKLIST BEFORE YOU HIT RECORD

- [ ] Phone in landscape
- [ ] Lens at eye level (not below)
- [ ] Window light on your face (not behind you)
- [ ] Quiet room
- [ ] Bullets visible but off-camera
- [ ] Glass of water within reach
- [ ] Recording in 1080p (default on iPhone)

Hit record. Talk. Stop. Move to the next.

You're not making a movie. You're making a Zoom call without me on it.

---

## RECORDING ORDER (suggested)

Record in this order so warm-up improves the most important video:

1. Video 1 (60 sec, easy) - warm-up
2. Video 2 (60-90 sec) - get comfortable
3. Video 3 (60-90 sec) - hitting stride
4. Video 4 (60-90 sec) - confident
5. **Video 5 (3-5 min, the big one)** - you're warmed up, do this last

If you flub Video 5, do it again. It's worth the extra take.
