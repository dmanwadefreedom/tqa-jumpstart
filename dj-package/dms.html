<script id="md-source" type="text/markdown"># LinkedIn DM Sequence, DJ Naronikar
**Campaign:** Security Manager to Director Outreach
**Launch target:** April 25, 2026 (moved from 18th, +1 week buffer)
**Channel:** LinkedIn Sales Nav / Dripify / DJ's tool / Dylan's app (TBD)
**Volume:** 100/day cold connects. Scale to 200/day if health holds.
**Daily cap:** NEVER exceed 250/day connection requests (LI throttle)

---

## THE MOTION

```
Connection Request (personalized, 300 char)
   ↓ (1-2 days)
Accept → DM1 (probe/value, no pitch)
   ↓ (wait for reply)
DM2 (deliver the doc)
   ↓ (3 days no action)
DM3 (soft nudge)
   ↓
Book Call → DJ runs discovery → $10K close
```

No calls-to-action in the connection request. No pitch. No offer. Cold audience earns the message through acceptance first.

---

## TARGETING FILTERS (LI Sales Nav or Dripify)

- **Titles:** "IT Security Manager" OR "Information Security Manager" OR "Cybersecurity Manager" OR "Security Operations Manager" OR "GRC Manager" OR "Security Engineering Manager" OR "InfoSec Manager"
- **Seniority:** Manager / Senior
- **Years in current role:** 3+ years (filters out recent promotions)
- **Region priority:** US tier 1 (CA, NY, TX, VA, DC, MA, WA), then UK, then Australia, then Canada
- **Company size:** 1001+ employees (can afford Director hires)
- **Industry priority:** Financial Services, Tech, Healthcare, Defense, Energy
- **Exclude:** Vendors, consultants-only-title, CISO/Director/VP already, recruiters

Tier A launch list. 500 strongest matches from the 10K scraped. Tier B/C layered in weeks 2-3.

---

## CONNECTION REQUEST (300 char max)

### Version A, peer positioning (recommended)

> Hi [First Name]. Saw your role at [Company]. I'm a 28-year CISO (Deloitte, EY, Shell) mentoring Security Managers into Director-level roles. Not selling anything here, just connecting with senior security folks I respect. Open to linking?

**Character count:** 259. Fits.

### Version B, curiosity hook

> Hey [First Name], came across your profile. 3 years as [Title] at [Company] puts you squarely in the group I work with most. I'm a 28-year CISO helping Security Managers break into Director roles. Happy to connect.

**Character count:** 247. Fits.

### Version C, no-pitch honest

> Hi [First Name]. No pitch here. I spent 28 years as a CISO (Deloitte, EY, Shell) and now mentor Security Managers into Director roles. Like to stay connected with people doing the work. Open to linking?

**Character count:** 220. Fits.

**Dylan's pick:** Version A. Combines credibility + clear value + explicit "not selling" which calms LI defensiveness. Best accept rate.

**Variables to merge:**
- `[First Name]` first name only, no honorifics
- `[Company]` current company
- `[Title]` exact title (optional in version B)

**Rotation:** Run A as primary. Test B and C on 100-lead cohorts each, week 2, measure accept rate.

---

## DM 1, THE PROBE (send 1-2 days after accept)

### Text:

> Thanks for connecting, [First Name].
>
> Quick question, no agenda. Are you looking at Director or Head of Security in the next 12-18 months, or are you happy running the team where you are?
>
> Reason I ask. I spent 28 years as a CISO and now mentor Security Managers through the Manager to Director jump. The ones who reach out to me have usually hit the same wall. Technical expert, but "not seen as leadership yet." Curious where you're sitting.
>
> DJ

**Character count:** ~470 (LI DM limit is 8000, well within)

**Why this works:**
- Opens with a direct, answerable question (easy reply)
- "No agenda" disarms the LinkedIn defense posture
- Credential drop is ONE line, not a paragraph
- Names the avatar's pain word-for-word ("technical expert, but not seen as leadership yet")
- Closes with curiosity, not an ask

**Expected response types:**

| Response | Meaning | Next step |
|---|---|---|
| "Yes, eyeing Director in 6-12 months" | HOT | Send DM2 (doc) immediately |
| "Yes but not sure when" | WARM | Send DM2 with softer framing |
| "Happy where I am" | COLD | Reply "All good, enjoy the rest of your week. Let me know if that changes." Tag in GHL: `dm1_no` |
| "What program?" | CURIOUS | Send DM2 (doc) |
| No response after 5 days | UNSURE | Send DM3 (nudge) |

---

## DM 2, THE DOC DELIVERY

### For affirmative responses:

> Appreciate the straight answer.
>
> I wrote the full playbook as a doc. The exact Manager to Director path I've walked students through for 28 years. 18 minute read. If it lands, there's a call link at the bottom. If not, no worries, at least you'll know what you're up against.
>
> [GOOGLE DOC LINK]
>
> Read it when you have a coffee moment.
>
> DJ

### For curious "what program?" responses:

> Good question. I'll let the doc answer it better than I can in a DM.
>
> Wrote the full thing up. 18 minute read. Walks through the exact Manager to Director framework. Read it, and if it's a fit there's a call link at the bottom. If not, no follow-up from me.
>
> [GOOGLE DOC LINK]
>
> DJ

**Character counts:** ~380 / ~320. Both fit.

**Why this works:**
- "Doc" is respected by senior technical people. A deliverable, not a sales page.
- Time-bounded ("18 minute read"). Feels contained.
- Built-in out ("if not, no worries"). Reduces pressure, counter-intuitively increases reads.
- Single CTA embedded in the doc, not the DM

---

## DM 3, THE NUDGE (3 days after DM2 if no reply)

### Text:

> Hey [First Name]. No pressure, just closing the loop. Did the doc land for you, or should I close it out?
>
> Either answer is fine. I'd rather have a clean no than a quiet maybe.
>
> DJ

**Character count:** ~175

**Why this works:**
- "Close it out" gives them permission to say no. Counterintuitively increases "yes" rate.
- "Clean no vs quiet maybe" is DJ's voice. Direct, respected by senior folks.
- Short DM. Feels low-effort to reply to.
- No restating the offer

**Expected outcomes after DM3:**
- 30% reply "let me read it"
- 20% reply "not a fit, thanks"
- 15% book a call directly
- 35% no reply (tag `dm3_silent`, remove from active sequence, can re-engage in 60 days)

---

## DM 4, POST-DOC (only if they say "I read it, want to talk")

### Text:

> Perfect. Here's my calendar. Pick whatever works for you.
>
> [CALENDLY LINK]
>
> 30 min. Not a sales call. We'll talk about where you are, where you want to go, and whether the program's the right move for you. I'll be direct. If it's not a fit, I'll tell you on the call and point you somewhere better.
>
> Talk soon.
>
> DJ

**Why this works:**
- Immediate, no friction, direct calendar link
- Pre-frames the call as honest, not sales-y
- "Not a sales call" matches Taki/Martell positioning
- Sets expectation for directness (DJ's actual style)

---

## POST-BOOKING EMAIL (auto-fires when Calendly webhook hits GHL)

**Trigger:** Calendly booking confirmed + GHL pipeline stage moves to `Call Booked`
**Send:** Immediately on booking
**From:** DJ Naronikar <dj@thequantumachievers.com>
**Subject:** [First Name], your call with DJ is booked. Watch this 4-min video first.

### Email body:

> Hi [First Name],
>
> Your call with me is locked in for [DATE / TIME / TIMEZONE].
>
> Before we hop on, I record one short video for everyone who books a call. Takes 4 minutes. Walks you through what we'll cover, what to bring, and one question I want you to think about before we talk.
>
> **Watch here:** [VIDEO 5 LINK or embedded MP4]
>
> Three things to have ready for the call:
> 1. Your current résumé (no need to polish, just whatever you'd send a recruiter today)
> 2. Your specific salary target 18 months from now
> 3. Your honest answer to "why haven't I been promoted yet"
>
> If something comes up and you need to reschedule, here's the link: [CALENDLY RESCHEDULE LINK]
>
> Talk soon,
>
> DJ Naronikar
> 28-Year CISO | Deloitte, EY, Shell

**Why this email works:**
- Subject line tells them there's a video to watch (raises open rate)
- Video is the first thing they see (max watch rate)
- The 3 items create homework (commitment device, increases show rate)
- One reschedule link (no friction, but also no escape)
- Plain signature with credentials reinforces "this is the real DJ, not a junior closer"

### 24-hour reminder email (auto-fires)

**Trigger:** 24 hours before scheduled call
**Subject:** [First Name], we're talking tomorrow at [TIME]

> Hi [First Name],

>
> If you haven't watched the 4-min walkthrough yet, do that now: [VIDEO 5 LINK]
>

> 1. Current résumé
> 2. Your 18-month salary target
> 3. Honest answer to why you haven't been promoted yet
>
> See you tomorrow.
>
> DJ

### 1-hour reminder (SMS via Twilio if phone captured)

> Reminder. Your call with DJ is in 1 hour. [CALENDLY ZOOM LINK]

If they're a fit, DJ sends this within 4 hours of the call.

### Subject: [First Name], your enrollment link

> [First Name],

>

>
> What I'd actually recommend instead:
>
> [SPECIFIC RESOURCE: book recommendation, free tool, different program, etc.]
>
> If anything changes in the next year, my DM is open.
>
> DJ

## DM VARIANTS, BY REPLY TYPE

### If they ask about price in DM:

> Fair question. It's $10,000. One pay or 3 months at $3,997. Full breakdown including the 14-week structure and the FAQ is in the doc, easier to read than type. [DOC LINK]

### If they ask about timing/commitment:

### If they say "I'm in a different country":

### If they're transitioning INTO cyber (not the target):

> Thanks for reaching out, but this specific program is for people already in cybersecurity looking to move to Director. If you're transitioning in, you want a different path. I don't run that program, but happy to point you to good resources if you DM me your background.

(Dylan: later we can route these to a free Freedom Code style lead magnet if you want, but for now, just be polite, don't sell.)

### If they're a recruiter:

> Appreciate the reach-out. Not working recruiter-side. Focused on my own coaching practice. Best of luck.

## GHL PIPELINE (Agresh to build)

**Pipeline name:** `TQA Director Path. LinkedIn Outbound`

**Stages:**
1. `Connect Sent` (connection request fired)
2. `Connected` (accepted)
3. `DM1 Sent` (probe sent)
4. `DM1 Replied` (got a response, split into `HOT` / `WARM` / `COLD`)
5. `DM2 Sent` (doc delivered)
6. `Doc Opened` (tracked via doc link, use Bitly / shortlink)
7. `Call Booked` (Calendly fires webhook)
8. `Call Held` (DJ marks after call)
9. `Proposal Sent` (DJ sends post-call kit)
10. `Closed Won` (Stripe webhook on $10K payment)
11. `Closed Lost` (DJ marks with reason)

**Tags to apply:**
- `li-outbound-apr25`
- `dj-manager-to-director`
- `tier-a` / `tier-b` / `tier-c` based on lead quality

**Triggers:**
- Stage to `Connected` auto-queue DM1 (48 hour delay)
- Stage to `DM1 Replied (HOT)` auto-trigger DM2 within 1 hour
- Stage to `Call Booked` auto-send post-booking email with Video 5 + 3 prep items
- 24 hours before call: auto-reminder email with Video 5 link
- 1 hour before call: SMS reminder (if phone captured)
- Stage to `Closed Won` auto-send onboarding email + Week 1 booking link + Stripe receipt

## VOLUME + PACE (LI health-safe)

**Week 1 (Apr 21-27):**
- Day 1-2: Set up DJ profile, warm inbox
- Day 3: Send 50 connections (test batch)
- Day 4: Send 75 connections
- Day 5: Scale to 100/day

**Week 2 (Apr 28 to May 4):**
- 100/day every day, 7 days
- Monitor accept rate (target: 35%+)
- DM1 fires on accepts (48hr delay)

**Week 3-4:**
- If accept rate healthy, scale to 150/day
- If reply rate weak, iterate connection message
- DJ starts running booked calls

**Hard rules:**
- No automation on weekends (looks spammy)
- Cap 200/day hard ceiling (LI warns at 250+)
- If LI Inbox Lock warning appears, pause 72 hours
- Backup manual mode if tool blocked

## WHO CLOSES?

**Current plan:** DJ runs the calls himself. 30 min discovery, then pitch, then close on call OR send offer doc via DM + Stripe link.

**Backup:** If DJ's calendar fills (good problem), Dylan sits on calls 2-3 as co-closer, learns DJ's pitch, takes later calls.

**Never:** Agresh, Shreyas, or a VA on closing calls. This is a $10K enterprise sale. Must be DJ or a senior closer.

| Metric | Target | Measure |
|---|---|---|
| Connection accept rate | 35%+ | LI tool dashboard |
| DM1 reply rate | 15%+ | LI tool dashboard |

## WHAT COULD GO WRONG + KILL SWITCHES

- **LI throttles DJ's account.** Pause tool, manual mode only, wait 72 hrs.
- **Low accept rate (<20%).** Profile mismatch. Iterate Headline + About first.
- **High accept, low DM1 reply.** DM1 copy not resonating. Test B/C variants.
- **High DM1 reply, low doc open.** DM2 framing weak. Try softer invite.
- **Doc opens, no call bookings.** Calendly friction or doc CTA unclear. Tighten CTA.
- **Calls book but no closes.** Pitch/close mechanics need tuning. Dylan joins as co-closer.

---

## ONE THING DJ NEEDS TO READ BEFORE LAUNCH

The doc and this DM sequence are calibrated to attract Security Managers who ALREADY feel stuck. DJ should resist the urge to:
- Add technical details in DMs ("by the way, I also teach MITRE mapping...")
- Discount the price in DMs
- Book calls with people transitioning INTO cyber
- Explain the program in DMs (doc handles it)

The doc sells. The DM opens the door. The call closes. Three jobs, three places.
