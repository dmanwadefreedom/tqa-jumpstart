## 1. HEADLINE (220 char limit)

**Recommended:**
> I help Security Managers become Directors | 28-year CISO (Deloitte, EY, Shell) | CIO Choice Award 2026 | 400+ organizations, 8 countries | Board Advisor

**Alt A (stronger hook):**

**Alt B (authority-heavy):**
> 28-Year CISO | Deloitte, EY, Shell | 400+ orgs | Board Advisor | I help Security Managers break into Director-level roles

**Dylan's pick:** Alt A. Hooks the avatar in the first 6 words. Credentials stack behind it.

## 2. ABOUT SECTION

**Rewrite:**

---

I've spent 28 years building security programs from the inside of the world's most demanding organizations.

CISO at Deloitte. CISO at EY. CISO at Shell.
Advisor to 400+ organizations across 8 countries.
I wrote the AI security policy for a Middle East central bank.
I stopped a $300K wire fraud in real time.
CIO Choice Award 2026.

But here's the work that matters most to me now.

I help Security Managers who've hit the ceiling break into Director-level roles.

You know the ceiling I mean.

You hold CISSP. Maybe CISM or CCSP. You run a team. Your board reports go in on time. Technically, you're the strongest operator in most rooms.

And yet the Director title stays out of reach. You apply, you interview, you don't get it. The person who does is usually less technical than you.

That's not a politics problem. It's a positioning problem. Director-level work is 20% technical, 80% translation, persuasion, budget defense, and executive communication. Almost no Security Manager has been trained for that. Because nobody ever teaches it.

I do.

Over 14 weeks, I work 1:1 with Security Managers and walk them through the three shifts that actually move someone from Manager to Director. Positioning. Executive Presence. Director-level Network.

I've hired hundreds of Security Managers into Director roles over 28 years. I know exactly what's landing in the interview and what's not. I know what a CISO sees when they look at your résumé. I know the quiet questions they're asking that you're not answering.

I cap my cohort at 15 students. Not for scarcity. Because 1:1 mentorship at this tier doesn't scale.

If you're a Security Manager and you're done waiting for a title you know you've earned, send me a DM. I'll send you the full document I wrote explaining how the program works. No pitch. No funnel. Just the document. Read it, decide.

Open to DMs from:
- IT Security Managers, Information Security Managers, Cybersecurity Managers
- 5+ years in role
- CISSP-equivalent or beyond
- Ready for Director-level compensation and responsibility

Not open to DMs from:
- Recruiters (use the LinkedIn recruiter tools)
- Vendors selling me something
- People transitioning INTO cyber (I have a different program, and this isn't it)
