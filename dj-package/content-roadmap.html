## THE STRATEGY (April 8 plan, preserved)

This was the plan DJ rejected in favor of speed. The thinking is still right. The timing was wrong.

### The big idea

Content does the selling. Over weeks. Each piece handles a specific objection or builds a specific belief. NLP principles, proof stacking, storytelling. By the time someone shows up to a webinar or call, they already trust DJ, they already believe the career switch is real, and they already know the price.

Inspired by: Taki Moore. Victoria Song. Dan Martell.

### The 3 video framework

3 SEO-specific videos that handle 80% of the selling:

1. **The Belief Reframe Video.** Dismantles the most common false belief about Director-tier promotions. Hosted on YouTube. SEO-optimized for "how to become a security director" type queries.

2. **The Proof Video.** Stacks DJ's credibility, his peer testimonials, and (after Cohort 1) student wins. Builds trust before any call.

3. **The Mechanism Video.** Walks through the 3 shifts. Positioning, Executive Presence, Network. Pre-sells the program structure.

Each video is 8-15 min. Studio quality. Hosted on YouTube + embedded across landing pages + linked in cold outreach.

### The content cadence

- LinkedIn: 3 posts/week from DJ (one piece of advice, one industry take, one student/career story)
- YouTube: 1 long-form video / week
- Podcast guest appearances: 2/month (DJ targets podcasts where Security Managers listen)
- Newsletter: 1/week to GHL list

### Why it's a 3-month build

- Need at least 12 LinkedIn posts before patterns form
- Need 6-8 YouTube videos for SEO traction
- Need 3-4 podcast appearances for cross-pollination
- Need testimonial library from Cohort 1 students

### Why we parked it for Q2

1. We need revenue THIS month, not in 90 days.
2. The doc-sell motion produces calls in week 1, closes in week 3.
3. Content content engine compounds revenue. It doesn't create it from zero.
4. Taki Moore built doc-sell first, content engine second. We follow that order.
5. DJ doesn't have student wins yet. Content without wins is positioning theater.

### Why it's right for Q3

1. After Cohort 1 closes, we have student wins to anchor every piece of content.
2. Doc-sell motion provides ongoing baseline revenue while content compounds.
3. July is post-summer-slump, fall hiring season starts. Cybersecurity Director hiring peaks Sep-Nov.
4. By Q3 DJ has comfort with the new positioning. Easier to talk to camera.
5. SEO content takes 90 days to rank. Plant in Q3, harvest in Q4 + Q1 2027.
